apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: heracles
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: localhost:5000/heracles/temporal-dev:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7233
              name: grpc
            - containerPort: 8233
              name: ui
---
# Internal gRPC endpoint used by all services and the worker
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: heracles
spec:
  type: ClusterIP
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
---
# Temporal UI exposed on localhost:30088
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: heracles
spec:
  type: LoadBalancer
  selector:
    app: temporal
  ports:
    - port: 8233
      targetPort: 8233

