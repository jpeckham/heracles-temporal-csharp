apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: heracles
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: temporalio/temporal-cli:latest
          command: ["temporal", "server", "start-dev"]
          args:
            - "--ip"
            - "0.0.0.0"
            - "--port"
            - "7233"
            - "--ui-port"
            - "8233"
          ports:
            - containerPort: 7233
              name: grpc
            - containerPort: 8233
              name: ui
---
# Internal gRPC endpoint used by all services and the worker
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: heracles
spec:
  type: ClusterIP
  selector:
    app: temporal
  ports:
    - name: grpc
      port: 7233
      targetPort: 7233
---
# Temporal UI exposed on localhost:30088
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: heracles
spec:
  type: NodePort
  selector:
    app: temporal
  ports:
    - port: 8233
      targetPort: 8233
      nodePort: 30088
