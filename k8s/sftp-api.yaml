apiVersion: apps/v1
kind: Deployment
metadata:
  name: sftp-api
  namespace: heracles
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sftp-api
  template:
    metadata:
      labels:
        app: sftp-api
    spec:
      containers:
        - name: sftp-api
          image: localhost:5000/heracles/sftp-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: heracles-config
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sftp-api
  namespace: heracles
spec:
  type: LoadBalancer
  selector:
    app: sftp-api
  ports:
    - port: 8083
      targetPort: 8080


